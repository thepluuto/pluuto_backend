{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Pluuto</title>
    <link rel="icon" type="image/png" href="{% static 'events/img/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        crossorigin="anonymous" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary-bg-start: #0B0F19;
            --primary-bg-end: #1A2438;
            --secondary-bg: #000000;
            --text-dark: #FFFFFF;
            --text-light: #A0AEC0;
            --text-white: #FFFFFF;
            --accent-color: #3182CE;
            --nav-bg: rgba(11, 15, 25, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            background: linear-gradient(135deg, var(--primary-bg-start) 0%, var(--primary-bg-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ----- Navbar ----- */
        .navbar {
            background-color: var(--primary-bg-start);
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
        }
        
        .navbar-brand img {
            height: 32px;
            object-fit: contain;
        }

        .btn-admin-login {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-white);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-admin-login:hover {
            background-color: var(--text-white);
            color: var(--primary-bg-start);
        }

        /* ----- Main Content ----- */
        main {
            flex: 1;
            padding: 60px 0;
            color: var(--text-light);
            display: flex;
            align-items: center;
        }

        .content-box {
            background: rgba(26, 36, 56, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .page-title {
            color: var(--text-white);
            font-weight: 800;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-align: center;
        }

        /* Form Styles */
        .form-control {
            background-color: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white !important;
            padding: 0.8rem 1rem;
            border-radius: 10px;
        }

        .form-control:focus {
            background-color: rgba(0, 0, 0, 0.3) !important;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.25rem rgba(49, 130, 206, 0.25);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background-color: #2b6cb0;
        }

        /* ----- Footer ----- */
        footer {
            padding: 1.5rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #fff;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .content-box {
                padding: 1.5rem;
            }

            .page-title {
                font-size: 2rem;
            }

            .footer-links {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="{% url 'root_landing' %}">
                <img src="{% static 'events/img/logo_white.png' %}" alt="Pluuto">
            </a>
            <a href="/admin/login/" class="btn btn-admin-login text-decoration-none">
                Admin Login <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
            </a>
        </div>
    </nav>

    <!-- Content -->
    <main class="container">
        <div class="row justify-content-center w-100">
            <div class="col-lg-8">
                <div class="content-box">
                    <h1 class="page-title">Get in Touch</h1>

                    {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-success bg-success text-white border-0">{{ message }}</div>
                    {% endfor %}
                    {% endif %}

                    <form method="POST" action="{% url 'contact_us' %}">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="text-white mb-2">Your Name</label>
                                <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                            </div>
                            <div class="col-md-6">
                                <label class="text-white mb-2">Email Address</label>
                                <input type="email" name="email" class="form-control" placeholder="john@example.com"
                                    required>
                            </div>
                            <div class="col-12">
                                <label class="text-white mb-2">Subject</label>
                                <input type="text" name="subject" class="form-control"
                                    placeholder="How can we help you?" required>
                            </div>
                            <div class="col-12">
                                <label class="text-white mb-2">Message</label>
                                <textarea name="message" class="form-control" rows="5"
                                    placeholder="Write your message here..." required></textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn-submit">
                                    Send Message <i class="fa-solid fa-paper-plane ms-2"></i>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <ul class="footer-links">
                <li><a href="{% url 'privacy_policy' %}">Privacy Policy</a></li>
                <li><a href="{% url 'terms_conditions' %}">Terms and Conditions</a></li>
                <li><a href="{% url 'contact_us' %}">Contact Us</a></li>
            </ul>
        </div>
    </footer>

</body>

</html>
