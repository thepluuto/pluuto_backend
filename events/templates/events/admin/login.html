{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to Pluuto</title>
    <link rel="icon" type="image/png" href="{% static 'events/img/favicon.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'events/css/admin_style.css' %}?v=2.2">
</head>

<body class="login-page"
    style="margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%); font-family: 'Inter', sans-serif;">
    <div class="login-card" style="text-align: center;">
        <div class="login-header" style="margin-bottom: 2rem;">
            <img src="{% static 'events/img/logo.png' %}" alt="Pluuto" style="height: 60px; margin-bottom: 0.5rem;">
            <h1 style="font-size: 1.5rem; font-weight: 700; color: #1f2937; margin: 0;">Sign in to Pluuto</h1>
        </div>

        {% if form.errors %}
        <div
            style="background-color: #fee2e2; border: 1px solid #fecaca; color: #b91c1c; padding: 0.75rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.875rem; text-align: left;">
            <i class="fa-solid fa-circle-exclamation"></i> Incorrect username or password.
        </div>
        {% endif %}

        <form method="post" style="text-align: left;">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username" class="form-label">Phone Number or Username</label>
                <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter your ID"
                    required autofocus>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label for="id_password" class="form-label" style="margin-bottom: 0;">Password</label>
                </div>
                <input type="password" name="password" id="id_password" class="form-control"
                    placeholder="Enter your password" required>
            </div>
            <button type="submit" class="action-btn btn-primary btn-block" style="font-size: 1rem; padding: 1rem;">
                Sign in <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
        </form>
    </div>
</body>

</html>
